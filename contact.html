   <form id="contactForm">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="form-floating">
                <input type="text" class="form-control" id="name" placeholder="Your Name" required>
                <label for="name">Your Name</label>
            </div>
        </div>

        <div class="col-md-6">
            <div class="form-floating">
                <input type="email" class="form-control" id="email" placeholder="Your Email" required>
                <label for="email">Your Email</label>
            </div>
        </div>

        <div class="col-12">
            <div class="form-floating">
                <input type="text" class="form-control" id="subject" placeholder="Subject" required>
                <label for="subject">Subject</label>
            </div>
        </div>

        <div class="col-12">
            <div class="form-floating">
                <textarea class="form-control" id="message" placeholder="Leave a message here" style="height: 200px" required></textarea>
                <label for="message">Message</label>
            </div>
        </div>

        <div class="col-12 text-center">
            <button class="btn btn-primary rounded-pill py-3 px-5" type="submit">
                Send Message
            </button>
        </div>
    </div>
</form>

<script>
document.getElementById("contactForm").addEventListener("submit", function(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let subject = document.getElementById("subject").value;
    let message = document.getElementById("message").value;

    let fullMessage = 
        "Name: " + name + "%0A" +
        "Email: " + email + "%0A%0A" +
        "Message:%0A" + message;

    let gmailURL = "https://mail.google.com/mail/?view=cm&fs=1&to=gurudevfood123@gmail.com&su=" 
                    + encodeURIComponent(subject) 
                    + "&body=" 
                    + encodeURIComponent(fullMessage);

    window.open(gmailURL, "_blank");
});
</script>
